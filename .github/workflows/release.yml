name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows
            os: windows-latest
          - label: macos
            os: macos-latest
          - label: linux
            os: ubuntu-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y fakeroot dpkg libopenjp2-tools

      - name: Build release packages
        run: npm run release

      - name: Collect release assets
        shell: pwsh
        run: ./scripts/collect-release-assets.ps1 -Platform ${{ matrix.label }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.label }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          path: downloaded
          pattern: release-assets-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: downloaded/*
